name: Build and Publish

on:
  repository_dispatch:
    types: [release-created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without v prefix)'
        required: true
      tag:
        description: 'Tag name (with v prefix)'
        required: true

env:
  RUST_BACKTRACE: 1

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: address-artisan
            asset_name: address-artisan-linux-x64

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: address-artisan
            asset_name: address-artisan-linux-arm64
            use_cross: true

          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: address-artisan.exe
            asset_name: address-artisan-windows-x64

          # macOS x64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: address-artisan
            asset_name: address-artisan-macos-x64

          # macOS ARM64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: address-artisan
            asset_name: address-artisan-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (if needed)
        if: matrix.use_cross == true
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup OpenCL dependencies (Linux)
        if: runner.os == 'Linux' && matrix.use_cross != true
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev opencl-headers

      - name: Setup OpenCL dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # Windows typically has OpenCL support through graphics drivers
          echo "OpenCL should be available through graphics drivers"

      - name: Setup OpenCL dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # macOS has OpenCL built-in
          echo "OpenCL is built into macOS"

      - name: Build binary (normal)
        if: matrix.use_cross != true
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.use_cross == true
        run: |
          cross build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.binary_name }}
          cd ../../../
          ls -la ${{ matrix.asset_name }}.tar.gz

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.asset_name }}.zip ${{ matrix.binary_name }}
          cd ../../../
          dir ${{ matrix.asset_name }}.zip

      - name: Calculate checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          else
            sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          fi
          cat ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Calculate checksums (Windows)
        if: runner.os == 'Windows'
        run: |
          certutil -hashfile ${{ matrix.asset_name }}.zip SHA256 > ${{ matrix.asset_name }}.zip.sha256
          type ${{ matrix.asset_name }}.zip.sha256

      - name: Upload binary to release (Unix)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
          files: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Upload binary to release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
          files: |
            ${{ matrix.asset_name }}.zip
            ${{ matrix.asset_name }}.zip.sha256

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup OpenCL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev opencl-headers

      - name: Login to crates.io
        run: |
          cargo login ${{ secrets.CRATES_IO_TOKEN }}

      - name: Verify package
        run: |
          cargo package --list
          cargo package --no-verify

      - name: Publish to crates.io
        run: |
          cargo publish --no-verify || echo "::warning::Package may already be published"

      - name: Comment on completion
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Find the release
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const release = releases.data.find(r =>
              r.tag_name === '${{ github.event.client_payload.tag || github.event.inputs.tag }}'
            );

            if (release) {
              // Update release body with completion status
              const currentBody = release.body || '';
              const updatedBody = currentBody + `

            ---
            ## 📦 Build Status
            ✅ All binaries have been built and attached to this release
            ✅ Package published to [crates.io](https://crates.io/crates/address-artisan)

            ### Installation
            You can now install via cargo:
            \`\`\`bash
            cargo install address-artisan
            \`\`\`

            Or download the pre-built binaries from the assets below.`;

              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: updatedBody
              });
            }