name: Test Release System

# Workflow para testar o sistema de release sem afetar main
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g., 0.0.1-test)'
        required: true
        default: '0.0.1-test'
      skip_crates_io:
        description: 'Skip crates.io publish (yes/no)'
        required: true
        default: 'yes'

jobs:
  test-validation:
    name: Test Version Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate version change
        run: |
          echo "Testing version validation with version: ${{ github.event.inputs.version }}"

          # Testa validação de versão semântica
          CURRENT="1.0.0"
          NEW="${{ github.event.inputs.version }}"

          echo "Current: $CURRENT"
          echo "New: $NEW"

          # Aqui você pode testar a lógica de validação

  test-build:
    name: Test Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: address-artisan-linux-x64-test

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: address-artisan-windows-x64-test

          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: address-artisan-macos-x64-test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup OpenCL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev opencl-headers

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset_name }}.tar.gz address-artisan
          cd ../../../
          echo "✅ Built: ${{ matrix.asset_name }}.tar.gz"
          ls -lh ${{ matrix.asset_name }}.tar.gz

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.asset_name }}.zip address-artisan.exe
          cd ../../../
          echo "✅ Built: ${{ matrix.asset_name }}.zip"
          dir ${{ matrix.asset_name }}.zip

      - name: Upload test artifacts
        uses: actions/upload-artifact@v3
        with:
          name: test-binaries-${{ matrix.os }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 1

  test-release:
    name: Test Release Creation
    needs: test-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: test-artifacts/

      - name: List artifacts
        run: |
          echo "📦 Test artifacts created:"
          find test-artifacts -type f -name "*.tar.gz" -o -name "*.zip" | while read file; do
            echo "  - $(basename $file) ($(du -h $file | cut -f1))"
          done

      - name: Simulate release notes
        run: |
          cat << EOF
          ## 🧪 Test Release v${{ github.event.inputs.version }}

          This is a TEST release to verify the CI/CD system.

          ### What would happen in a real release:
          1. ✅ Tag v${{ github.event.inputs.version }} would be created
          2. ✅ GitHub Release would be created
          3. ✅ Binaries would be attached
          4. $([ "${{ github.event.inputs.skip_crates_io }}" = "no" ] && echo "✅" || echo "⏭️") Publish to crates.io

          ### Test Results:
          - Version validation: ✅
          - Linux build: ✅
          - Windows build: ✅
          - macOS build: ✅
          EOF